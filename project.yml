name: ShadowrunGame
options:
  bundleIdPrefix: com.shadowrun
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: "minimal"
    SWIFT_UPCOMING_FEATURE_ISOLATED_DEFAULT_VALUES: "NO"
    SWIFT_UPCOMING_FEATURE_REGION_BASED_ISOLATION: "NO"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  ShadowrunGame:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "*.xcodeproj"
          - "*.xcodeproj.backup-*"
          - "**/*.xcodeproj.backup-*"
          - "*.xcworkspace"
          - "project.yml"
          - "*.md"
          - "**/*.md"
          - "*.yml"
          - "*.backup"
          - "**/*.backup"
          - "*.sh"
          - "*.log"
          - "*.png"
          - "*.txt"
          - "Tools"
          - ".DS_Store"
          - "**/.DS_Store"
          - ".git"
          - ".github"
          - ".gitignore"
          - "build"
          - "docs"
          - "scripts"
          - "tests"
          - "screenshots"
          - "*.xcuserstate"
          - "**/*.xcuserstate"
      - path: Sprites
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shadowrun.game
        INFOPLIST_FILE: Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"